name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: スキルとリポジトリ構成の検証
        run: node bin/validate.mjs
      - name: bin ヘルパのスモーク
        run: |
          node bin/dango-state.mjs path
          node bin/dango-codex.mjs "noop" || true   # codex 未導入でも graceful に終わる
